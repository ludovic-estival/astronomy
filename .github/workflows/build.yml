name: Build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir --name astronomy main.py

      - name: Archive build
        shell: bash
        run: |
          mkdir release
          if [ "$RUNNER_OS" == "Windows" ]; then
            powershell Compress-Archive dist/astronomy release/astronomy-${{ github.ref_name }}-windows.zip
          elif [ "$RUNNER_OS" == "Linux" ]; then
            zip -r release/astronomy-${{ github.ref_name }}-linux.zip dist/astronomy
          else
            zip -r release/astronomy-${{ github.ref_name }}-macos.zip dist/astronomy
          fi

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
